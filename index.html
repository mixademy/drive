<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixademy Drive - SaaS Cloud Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .file-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .transition-all {
            transition: all 0.2s ease-in-out;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1f2937;
        }

        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #8b5cf6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #upload-progress-container {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1f2937;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #374151;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            z-index: 100;
            min-width: 250px;
        }

        .progress-bar-bg {
            background: #374151;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-bar-fill {
            background: #8b5cf6;
            height: 100%;
            width: 0%;
            transition: width 0.2s;
        }
    </style>
    <script>
        tailwind.config = { theme: { extend: { colors: { mixademy: { 500: '#8b5cf6', 600: '#7c3aed', 900: '#4c1d95' } } } } }
    </script>
</head>

<body class="bg-gray-900 text-gray-100 h-screen flex overflow-hidden selection:bg-mixademy-500 selection:text-white">

    <!-- LOGIN SCREEN -->
    <div id="login-screen"
        class="fixed inset-0 bg-gray-900 flex items-center justify-center z-50 transition-opacity duration-300">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
            <div class="text-center mb-8">
                <i class="fa-solid fa-cloud text-mixademy-500 text-5xl mb-4"></i>
                <h1 class="text-2xl font-bold">Mixademy <span class="text-mixademy-500">Drive</span></h1>
                <p class="text-gray-400 mt-2">Közös munkaterület bejelentkezés</p>
            </div>

            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-400 mb-1">Szervezet (Workspace ID)</label>
                    <input type="text" id="login-workspace" required
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-mixademy-500 text-white"
                        placeholder="pl. mixademy">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-400 mb-1">Felhasználónév</label>
                    <input type="text" id="login-username" required
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-mixademy-500 text-white"
                        placeholder="pl. DJ_Bela">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-400 mb-1">Jelszó</label>
                    <input type="password" id="login-password" required
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-mixademy-500 text-white"
                        placeholder="••••••••">
                </div>

                <p id="login-error" class="text-red-500 text-sm mb-4 text-center hidden"></p>

                <button type="button" id="btn-login"
                    class="w-full bg-mixademy-500 hover:bg-mixademy-600 text-white font-bold py-3 rounded-lg transition-colors flex justify-center items-center gap-2">
                    Belépés a Drive-ba <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-screen" class="hidden flex w-full h-full">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col hidden md:flex">
            <div class="h-16 flex items-center px-6 border-b border-gray-700">
                <i class="fa-solid fa-cloud text-mixademy-500 text-2xl mr-3"></i>
                <span class="text-xl font-bold tracking-wider">Mixademy<span
                        class="text-mixademy-500">Drive</span></span>
            </div>
            <div class="p-4 space-y-3">
                <button id="btn-upload-trigger"
                    class="w-full bg-mixademy-500 hover:bg-mixademy-600 text-white font-semibold py-3 px-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-file-arrow-up"></i> Fájl feltöltése
                </button>
                <input type="file" id="file-upload" class="hidden" multiple>

                <button id="btn-new-folder"
                    class="w-full bg-gray-700 hover:bg-gray-600 text-white font-semibold py-3 px-4 rounded-xl shadow transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-folder-plus"></i> Új mappa
                </button>
            </div>
            <nav class="flex-1 px-4 space-y-1 mt-4">
                <a href="#" id="btn-nav-root"
                    class="flex items-center gap-3 bg-gray-900 text-white px-3 py-2.5 rounded-lg transition-all border border-gray-700">
                    <i class="fa-solid fa-hard-drive w-5 text-mixademy-500"></i> <span
                        id="workspace-name-display">Meghajtó</span>
                </a>
            </nav>
            <div class="p-4 border-t border-gray-700">

                <!-- VISSZA AZ EVENT MANAGERBE GOMB (Alapból rejtve) -->
                <button id="btn-back-to-event"
                    class="hidden w-full flex items-center justify-center gap-2 text-mixademy-500 border border-mixademy-500 hover:bg-mixademy-500 hover:text-white px-3 py-2.5 rounded-lg transition-all mb-3 text-sm font-bold">
                    <i class="fa-solid fa-arrow-left"></i> Vissza az Eventbe
                </button>

                <div class="flex items-center gap-3 mb-4 px-2">
                    <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center font-bold text-sm"
                        id="sidebar-avatar"></div>
                    <div>
                        <div class="text-sm font-bold" id="sidebar-username">User</div>
                        <div class="text-xs text-gray-400" id="sidebar-role">Role</div>
                    </div>
                </div>
                <button id="btn-logout"
                    class="w-full flex items-center gap-3 text-red-400 hover:bg-red-500/10 px-3 py-2.5 rounded-lg transition-all">
                    <i class="fa-solid fa-right-from-bracket w-5"></i> Kijelentkezés
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-screen overflow-hidden">
            <header class="h-16 bg-gray-800 border-b border-gray-700 flex items-center justify-between px-6">
                <div class="flex items-center gap-4">
                    <button id="back-btn"
                        class="hidden text-gray-400 hover:text-white bg-gray-700 p-2 rounded-lg transition-colors">
                        <i class="fa-solid fa-arrow-left"></i> Vissza
                    </button>
                    <h2 id="current-path-display" class="text-lg font-semibold text-gray-200">Saját meghajtó</h2>
                </div>
                <div class="flex items-center gap-4">
                    <div id="upload-loader" class="loader"></div>
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-mixademy-600 to-blue-500 flex items-center justify-center text-white font-bold border-2 border-gray-800"
                        id="topbar-avatar">U</div>
                </div>
            </header>

            <!-- Files Area -->
            <div class="flex-1 overflow-y-auto p-6 relative" id="drive-content"></div>
        </main>
    </div>

    <!-- Upload Progress UI -->
    <div id="upload-progress-container">
        <div class="flex justify-between items-center mb-1">
            <span class="text-sm font-semibold" id="upload-status-text">Feltöltés folyamatban...</span>
            <span class="text-xs text-gray-400" id="upload-percentage">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="upload-progress-fill"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9p3wAII0V0uAKpLwsPSqDOJTZFjJlQQU",
            authDomain: "mixademy-event.firebaseapp.com",
            projectId: "mixademy-event",
            storageBucket: "mixademy-event.firebasestorage.app",
            messagingSenderId: "428262319146",
            appId: "1:428262319146:web:a8d34c27a398ed24814f53"
        };

        const app = initializeApp(firebaseConfig);
        const dbFirestore = getFirestore(app);
        const cloudStorage = getStorage(app);

        // --- ÁLLAPOTKEZELÉS ---
        let currentWorkspaceId = null;
        let currentUser = null;
        let currentFolderId = 'root';
        let folderHistory = [];
        let driveDb = { files: [] };
        let unsubscribeDrive = null;

        // --- INICIALIZÁLÁS ÉS URL DEEP LINKING ---
        function init() {
            // URL Paraméterek ellenőrzése
            const urlParams = new URLSearchParams(window.location.search);
            const source = urlParams.get('source');
            const urlWs = urlParams.get('ws');
            const urlUser = urlParams.get('user');

            // "Vissza az Eventbe" gomb megjelenítése, ha az EventCore-ból jött
            if (source === 'eventcore') {
                const backBtn = document.getElementById('btn-back-to-event');
                backBtn.classList.remove('hidden');
                backBtn.addEventListener('click', () => { window.close(); window.location.href = "javascript:history.back()"; });
            }

            // Bejelentkezési mezők előzetes kitöltése
            if (urlWs) document.getElementById('login-workspace').value = urlWs;
            if (urlUser) document.getElementById('login-username').value = urlUser;

            // Session (SSO) ellenőrzése
            const storedUser = localStorage.getItem('mixademy_currentUser');
            const storedWorkspace = localStorage.getItem('mixademy_workspace');

            if (storedUser && storedWorkspace) {
                currentUser = JSON.parse(storedUser);
                currentWorkspaceId = storedWorkspace;
                setupUI(); startCloudListener(); showApp();
            }
        }

        // --- HITELESÍTÉS ---
        async function handleLogin() {
            const ws = document.getElementById('login-workspace').value.trim().toLowerCase();
            const u = document.getElementById('login-username').value.trim();
            const p = document.getElementById('login-password').value;
            const errorMsg = document.getElementById('login-error');
            const btn = document.getElementById('btn-login');

            if (!ws || !u || !p) { errorMsg.innerText = "Minden mező kötelező!"; errorMsg.classList.remove('hidden'); return; }
            btn.innerHTML = 'Hitelesítés... <i class="fa-solid fa-spinner fa-spin"></i>'; errorMsg.classList.add('hidden');

            try {
                const inputEncoded = btoa(p);
                const userDoc = await getDoc(doc(dbFirestore, "workspaces", ws, "core", "users"));

                if (userDoc.exists()) {
                    const userFound = (userDoc.data().list || []).find(user => user.username === u && user.encodedPassword === inputEncoded);
                    if (userFound) {
                        currentWorkspaceId = ws; currentUser = { username: userFound.username, role: userFound.role };
                        localStorage.setItem('mixademy_workspace', ws); localStorage.setItem('mixademy_currentUser', JSON.stringify(currentUser));
                        setupUI(); startCloudListener(); showApp();
                    } else { errorMsg.innerText = "Hibás jelszó!"; errorMsg.classList.remove('hidden'); }
                } else { errorMsg.innerText = "Ez a szervezet nem létezik!"; errorMsg.classList.remove('hidden'); }
            } catch (error) { errorMsg.innerText = "Rendszerhiba!"; errorMsg.classList.remove('hidden'); console.error(error); }
            finally { btn.innerHTML = 'Belépés a Drive-ba <i class="fa-solid fa-arrow-right"></i>'; }
        }

        function handleLogout() {
            localStorage.removeItem('mixademy_currentUser'); localStorage.removeItem('mixademy_workspace');
            if (unsubscribeDrive) unsubscribeDrive();
            currentUser = null; currentWorkspaceId = null; currentFolderId = 'root'; driveDb = { files: [] };
            document.getElementById('app-screen').classList.add('hidden'); document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('login-password').value = '';
        }

        function showApp() { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('app-screen').classList.remove('hidden'); }

        function setupUI() {
            const initial = currentUser.username.charAt(0).toUpperCase();
            document.getElementById('topbar-avatar').innerText = initial; document.getElementById('sidebar-avatar').innerText = initial;
            document.getElementById('sidebar-username').innerText = currentUser.username; document.getElementById('sidebar-role').innerText = currentUser.role;
            document.getElementById('workspace-name-display').innerText = `${currentWorkspaceId.toUpperCase()} Drive`;
        }

        // --- FIRESTORE SZINKRONIZÁCIÓ ---
        function startCloudListener() {
            if (unsubscribeDrive) unsubscribeDrive();
            unsubscribeDrive = onSnapshot(collection(dbFirestore, "workspaces", currentWorkspaceId, "drive_files"), (snapshot) => {
                driveDb.files = []; snapshot.forEach((doc) => { driveDb.files.push({ id: doc.id, ...doc.data() }); }); renderDrive();
            });
        }

        // --- NAVIGÁCIÓ ---
        function navigateTo(folderId, folderName = 'Saját meghajtó') {
            if (folderId !== 'root') { folderHistory.push(currentFolderId); } else { folderHistory = []; }
            currentFolderId = folderId; document.getElementById('current-path-display').innerText = folderName; renderDrive();
        }

        function navigateBack() {
            if (folderHistory.length > 0) {
                currentFolderId = folderHistory.pop();
                let folderName = 'Saját meghajtó';
                if (currentFolderId !== 'root') { const folder = driveDb.files.find(f => f.id === currentFolderId); if (folder) folderName = folder.name; }
                document.getElementById('current-path-display').innerText = folderName; renderDrive();
            }
        }

        // --- FELHŐ MŰVELETEK ---
        async function createNewFolder() {
            const folderName = prompt("Add meg az új mappa nevét:");
            if (folderName && folderName.trim() !== "") {
                await addDoc(collection(dbFirestore, "workspaces", currentWorkspaceId, "drive_files"), {
                    name: folderName.trim(), type: 'folder', parentId: currentFolderId, createdAt: new Date().toISOString(), owner: currentUser.username
                });
            }
        }

        function handleFileUpload(event) {
            const files = event.target.files; if (files.length === 0) return;
            const file = files[0]; const progressContainer = document.getElementById('upload-progress-container');
            const progressFill = document.getElementById('upload-progress-fill'); const progressText = document.getElementById('upload-percentage');

            progressContainer.style.display = 'block'; progressFill.style.width = '0%'; progressText.innerText = '0%';
            document.getElementById('upload-status-text').innerText = `Feltöltés: ${file.name}`;

            const storagePath = `drive/${currentWorkspaceId}/${Date.now()}_${file.name}`;
            const uploadTask = uploadBytesResumable(ref(cloudStorage, storagePath), file);

            uploadTask.on('state_changed',
                (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    progressFill.style.width = progress + '%'; progressText.innerText = Math.round(progress) + '%';
                },
                (error) => { alert("Hiba történt a feltöltés során."); progressContainer.style.display = 'none'; },
                async () => {
                    const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                    await addDoc(collection(dbFirestore, "workspaces", currentWorkspaceId, "drive_files"), {
                        name: file.name, type: 'file', mimeType: file.type, size: file.size, url: downloadURL, storagePath: storagePath,
                        parentId: currentFolderId, createdAt: new Date().toISOString(), owner: currentUser.username
                    });
                    setTimeout(() => { progressContainer.style.display = 'none'; }, 1000);
                }
            ); event.target.value = '';
        }

        window.deleteItem = async function (id, type) {
            if (!confirm(`Biztosan törölni szeretnéd a felhőből?`)) return;
            const item = driveDb.files.find(f => f.id === id); if (!item) return;

            if (type === 'file' && item.storagePath) { try { await deleteObject(ref(cloudStorage, item.storagePath)); } catch (e) { } }
            if (type === 'folder') {
                const children = driveDb.files.filter(f => f.parentId === id);
                for (const child of children) {
                    if (child.type === 'file' && child.storagePath) { try { await deleteObject(ref(cloudStorage, child.storagePath)); } catch (e) { } }
                    await deleteDoc(doc(dbFirestore, "workspaces", currentWorkspaceId, "drive_files", child.id));
                }
            }
            await deleteDoc(doc(dbFirestore, "workspaces", currentWorkspaceId, "drive_files", id));
        }

        window.downloadFile = function (id) {
            const file = driveDb.files.find(f => f.id === id);
            if (file && file.url) window.open(file.url, '_blank');
        }

        window.navigateToGlobal = function (id, name) { navigateTo(id, name); }

        // --- SEGÉDFÜGGVÉNYEK ÉS RENDERELÉS ---
        function formatSize(bytes) {
            if (bytes === 0) return '0 Bytes'; const k = 1024; const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k)); return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function getFileIcon(mimeType) {
            if (!mimeType) return '<i class="fa-solid fa-file text-gray-500"></i>';
            if (mimeType.includes('image')) return '<i class="fa-solid fa-image text-blue-400"></i>';
            if (mimeType.includes('pdf')) return '<i class="fa-solid fa-file-pdf text-red-500"></i>';
            if (mimeType.includes('audio')) return '<i class="fa-solid fa-music text-pink-500"></i>';
            if (mimeType.includes('video')) return '<i class="fa-solid fa-video text-purple-500"></i>';
            if (mimeType.includes('zip') || mimeType.includes('rar')) return '<i class="fa-solid fa-file-zipper text-yellow-500"></i>';
            return '<i class="fa-solid fa-file-lines text-gray-400"></i>';
        }

        function renderDrive() {
            const contentArea = document.getElementById('drive-content'); const backBtn = document.getElementById('back-btn');
            if (currentFolderId === 'root') { backBtn.classList.add('hidden'); } else { backBtn.classList.remove('hidden'); }

            const items = driveDb.files.filter(f => f.parentId === currentFolderId);
            if (items.length === 0) { contentArea.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-gray-500"><i class="fa-solid fa-folder-open text-6xl mb-4 text-gray-700"></i><h3 class="text-xl font-medium text-gray-400">Ez a mappa üres</h3></div>`; return; }

            const folders = items.filter(i => i.type === 'folder'); const files = items.filter(i => i.type === 'file'); let html = '';

            if (folders.length > 0) {
                html += `<h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">Mappák</h2><div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-8">`;
                folders.forEach(folder => {
                    html += `<div class="file-card bg-gray-800 border border-gray-700 rounded-xl p-4 flex items-center justify-between cursor-pointer transition-all group">
                                <div class="flex items-center gap-3 w-full overflow-hidden" onclick="navigateToGlobal('${folder.id}', '${folder.name}')">
                                    <i class="fa-solid fa-folder text-mixademy-500 text-2xl flex-shrink-0"></i><span class="font-medium truncate">${folder.name}</span>
                                </div>
                                <button onclick="deleteItem('${folder.id}', 'folder')" class="text-gray-500 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-2"><i class="fa-solid fa-trash"></i></button>
                            </div>`;
                }); html += `</div>`;
            }

            if (files.length > 0) {
                html += `<h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">Fájlok</h2><div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">`;
                files.forEach(file => {
                    html += `<div class="file-card bg-gray-800 border border-gray-700 rounded-xl overflow-hidden flex flex-col group relative">
                                <div class="h-32 bg-gray-900 flex items-center justify-center text-5xl">${getFileIcon(file.mimeType)}</div>
                                <div class="absolute inset-0 bg-gray-900/80 flex items-center justify-center gap-4 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button onclick="downloadFile('${file.id}')" class="bg-blue-500 hover:bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg transition-transform hover:scale-110"><i class="fa-solid fa-external-link-alt"></i></button>
                                    <button onclick="deleteItem('${file.id}', 'file')" class="bg-red-500 hover:bg-red-600 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg transition-transform hover:scale-110"><i class="fa-solid fa-trash"></i></button>
                                </div>
                                <div class="p-3 border-t border-gray-700 bg-gray-800">
                                    <p class="text-sm font-medium truncate" title="${file.name}">${file.name}</p>
                                    <p class="text-xs text-gray-500 mt-1">${formatSize(file.size)} • ${file.owner || 'Ismeretlen'}</p>
                                </div>
                            </div>`;
                }); html += `</div>`;
            } contentArea.innerHTML = html;
        }

        document.getElementById('btn-login').addEventListener('click', handleLogin);
        document.getElementById('btn-logout').addEventListener('click', handleLogout);
        document.getElementById('btn-upload-trigger').addEventListener('click', () => document.getElementById('file-upload').click());
        document.getElementById('file-upload').addEventListener('change', handleFileUpload);
        document.getElementById('btn-new-folder').addEventListener('click', createNewFolder);
        document.getElementById('back-btn').addEventListener('click', navigateBack);
        document.getElementById('btn-nav-root').addEventListener('click', () => navigateTo('root'));

        window.onload = init;
    </script>
</body>

</html>
